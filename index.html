<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency converter</title>
  <link rel="stylesheet" href="moneda.estilo.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="moneda.script.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <div class="container">
    <i class="fas fa-coins fa-3x icon"></i>
    <h1 class="title">Currency Converter</h1>

    <div class="converter">
      <input type="number" id="amount" placeholder="Enter the amount" class="input-amount">

      <div class="currency-selectors">
        <div class="currency-selector">
          <label for="currencyFrom">From:</label>
          <select id="currencyFrom" class="select">
          </select>
        </div>
        <div id="arrows" class="arrows">
          ↑↓
        </div>
        <div class="currency-selector">
          <label for="currencyTo">To:</label>
          <select id="currencyTo" class="select">
          </select>
        </div>
      </div>

      <button id="convertButton" class="convert-btn">Convert</button>
      
      <div id="result" class="result"></div>
    </div>
  </div>
</body>
</html>
